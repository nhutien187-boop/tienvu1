<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - MedReminder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, rgba(91, 60, 255, 0.14), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(46, 181, 255, 0.15), transparent 30%),
                        #f4f7ff;
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            max-width: 460px;
            width: 100%;
            border-radius: 28px;
            padding: 36px;
            background: #ffffff;
            box-shadow: 0 32px 80px rgba(55, 66, 129, 0.12);
            border: 1px solid rgba(111, 125, 255, 0.12);
        }
        .auth-card h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .form-control {
            border-radius: 16px;
            border: 1px solid rgba(111, 125, 255, 0.2);
            padding: 1rem 1.2rem;
            background: #fbfbff;
        }
        .form-control:focus {
            border-color: rgba(91, 60, 255, 0.45);
            box-shadow: 0 0 0 0.18rem rgba(91, 60, 255, 0.12);
        }
        .btn-primary {
            border-radius: 999px;
            padding: 0.95rem 1.5rem;
        }
        .small-link {
            color: var(--bs-primary);
            font-weight: 600;
            text-decoration: none;
        }
        .small-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="mb-4 text-center">
            <span class="badge bg-primary-soft text-primary rounded-pill px-3 py-2 mb-2">MedReminder</span>
            <h2 class="fw-bold">Đăng ký tài khoản</h2>
            <p class="text-muted">Tạo tài khoản mới để truy cập trang quản lý lịch uống thuốc.</p>
        </div>

        <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">Họ tên</label>
                <input type="text" id="registerName" class="form-control" placeholder="Nhập họ tên" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" id="registerEmail" class="form-control" placeholder="email@domain.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Mật khẩu</label>
                <input type="password" id="registerPassword" class="form-control" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng ký</button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted">Đã có tài khoản? </span>
            <a href="login.html" class="small-link">Đăng nhập</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        $(document).ready(function() {
            redirectIfAuthenticated('index.html');

            $('#registerForm').submit(function(event) {
                event.preventDefault();
                const name = $('#registerName').val().trim();
                const email = $('#registerEmail').val().trim();
                const password = $('#registerPassword').val().trim();

                if (!name || !email || !password) {
                    $('#alertBox').removeClass('d-none').text('Vui lòng nhập đủ thông tin.');
                    return;
                }

                const result = registerUser({ name, email, password });
                if (!result.success) {
                    $('#alertBox').removeClass('d-none').text(result.message);
                    return;
                }

                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
