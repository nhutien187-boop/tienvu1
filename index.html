<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedReminder - Quản lý & Theo dõi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #5b3cff;
            --secondary: #7588ff;
            --success: #22c392;
            --danger: #ff5d7a;
            --bg: #eef2ff;
            --surface: #ffffff;
            --surface-soft: #f6f7ff;
            --text: #232a4a;
            --muted: #6f7b9d;
            --border: rgba(110, 125, 255, 0.14);
            --shadow: 0 30px 80px rgba(50, 63, 128, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(91, 60, 255, 0.2), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(95, 196, 255, 0.14), transparent 28%),
                        var(--bg);
            color: var(--text);
            padding-bottom: 100px;
        }

        .navbar {
            background: linear-gradient(135deg, rgba(91, 60, 255, 1), rgba(117, 136, 255, 0.95));
            border: none;
            box-shadow: 0 24px 70px rgba(49, 67, 160, 0.18);
        }

        .navbar .navbar-brand {
            letter-spacing: 0.03em;
        }

        .navbar .btn {
            border-radius: 999px;
            font-weight: 700;
        }

        .hero-panel {
            background: rgba(255,255,255,0.98);
            border: 1px solid rgba(110, 125, 255, 0.16);
            border-radius: 36px;
            padding: 36px;
            box-shadow: 0 35px 95px rgba(49, 67, 160, 0.14);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .hero-panel::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -90px;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(91, 60, 255, 0.20), transparent 55%);
            filter: blur(14px);
            pointer-events: none;
        }

        .hero-panel::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(117, 136, 255, 0.14), transparent 60%);
            filter: blur(12px);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            background: rgba(91, 60, 255, 0.09);
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .hero-panel h2 {
            font-size: clamp(2.2rem, 2.8vw, 3rem);
            letter-spacing: -0.04em;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .hero-panel p {
            color: var(--muted);
            max-width: 730px;
            position: relative;
            z-index: 1;
        }

        .hero-actions {
            margin-top: 1.75rem;
            position: relative;
            z-index: 1;
        }

        .hero-stat {
            background: var(--surface-soft);
            border: 1px solid rgba(110, 125, 255, 0.12);
            border-radius: 22px;
            padding: 22px 26px;
            min-width: 150px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.75);
        }

        .next-card {
            background: #ffffff;
            border: 1px solid rgba(91, 60, 255, 0.12);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 18px 46px rgba(91, 60, 255, 0.08);
        }

        .next-card h5 {
            margin-bottom: 0.85rem;
        }

        .reminder-time {
            font-size: 2.35rem;
            letter-spacing: -0.04em;
            color: var(--primary);
        }

        .reminder-meta {
            color: var(--muted);
        }

        .hero-stat h3 {
            font-size: 1.9rem;
            margin-bottom: 0.35rem;
            color: var(--text);
        }

        .hero-stat small {
            color: var(--muted);
        }

        .card-med {
            border: none;
            border-radius: 28px;
            box-shadow: 0 20px 65px rgba(50, 63, 128, 0.12);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            background: linear-gradient(180deg, #ffffff, #f7f8ff);
            position: relative;
            overflow: hidden;
        }

        .card-med::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, rgba(91, 60, 255, 1), rgba(117, 136, 255, 0.8));
        }

        .card-med:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 80px rgba(50, 63, 128, 0.16);
        }

        .card-med .card-body {
            padding: 26px 24px 22px;
        }

        .med-name {
            font-size: 1.15rem;
            letter-spacing: -0.02em;
        }

        .is-taken {
            background: #eef4ff !important;
        }

        .is-taken .med-name {
            text-decoration: line-through;
            color: #8d99c7;
        }

        .filter-section {
            background: rgba(255,255,255,0.96);
            padding: 28px;
            border-radius: 28px;
            border: 1px solid rgba(110, 125, 255, 0.12);
            box-shadow: 0 20px 55px rgba(82, 94, 180, 0.08);
            margin-bottom: 30px;
        }

        .view-toggle {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .view-toggle .btn {
            border-radius: 999px;
            font-weight: 700;
            padding: 0.65rem 1.1rem;
        }

        .view-toggle .btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 16px 34px rgba(91, 60, 255, 0.18);
        }

        .time-badge {
            background: rgba(91, 60, 255, 0.08);
            color: var(--primary);
            padding: 8px 18px;
            border-radius: 999px;
            font-weight: 700;
        }

        .calendar-week-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 14px;
        }

        .calendar-day-column {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            border: 1px solid rgba(110, 125, 255, 0.12);
            padding: 18px 14px;
            min-height: 240px;
            box-shadow: 0 18px 46px rgba(82, 94, 180, 0.08);
        }

        .calendar-day-title {
            font-weight: 800;
            margin-bottom: 4px;
        }

        .calendar-day-meta {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .calendar-day-count {
            display: inline-flex;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(91, 60, 255, 0.08);
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .calendar-item {
            background: #f8f9ff;
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(110, 125, 255, 0.10);
        }

        .calendar-item .calendar-item-time {
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .calendar-item .calendar-item-name {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .calendar-item .calendar-item-status {
            font-size: 0.82rem;
            color: var(--muted);
        }

        .calendar-empty-state {
            color: var(--muted);
            font-size: 0.92rem;
            padding-top: 4px;
        }

        .calendar-month-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 12px;
        }

        .calendar-month-cell {
            background: rgba(255,255,255,0.96);
            border-radius: 18px;
            border: 1px solid rgba(110, 125, 255, 0.12);
            min-height: 120px;
            padding: 12px;
            box-shadow: 0 14px 36px rgba(82, 94, 180, 0.06);
        }

        .calendar-month-cell--disabled {
            opacity: 0.48;
        }

        .calendar-month-cell--today {
            border-color: rgba(91, 60, 255, 0.4);
        }

        .calendar-month-label {
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text);
        }

        .calendar-month-summary {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.86rem;
            color: var(--muted);
        }

        .calendar-month-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(91, 60, 255, 0.08);
            color: var(--primary);
            font-weight: 700;
        }

        @media (max-width: 992px) {
            .calendar-week-grid,
            .calendar-month-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .calendar-week-grid,
            .calendar-month-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-control,
        .form-control:focus,
        .form-control:focus-visible {
            border-radius: 999px;
            border: 1px solid rgba(110, 125, 255, 0.2);
            box-shadow: none;
            padding: 0.95rem 1.15rem;
            background: #f9fbff;
        }

        .form-control:focus {
            border-color: rgba(91, 60, 255, 0.35);
        }

        .btn-primary {
            background: var(--primary);
            border-color: transparent;
            box-shadow: 0 16px 34px rgba(91, 60, 255, 0.18);
        }

        .btn-primary:hover {
            background: #4238ff;
        }

        .btn-outline-light {
            color: #ffffff;
            border-color: rgba(255,255,255,0.35);
        }

        .btn-outline-light:hover {
            color: white;
            background: rgba(255,255,255,0.12);
        }

        .fab-add {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, var(--primary), #6b7dff);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 28px 64px rgba(91, 60, 255, 0.24);
            border: none;
            z-index: 1000;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .fab-add:hover {
            transform: scale(1.08);
            background: #3829ff;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.78);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .schedule-empty {
            min-height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
        }

        .modal-content {
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(110, 125, 255, 0.12);
        }

        .modal-body .form-control {
            border-radius: 18px;
            padding: 0.95rem 1.25rem;
            background: #f7f8ff;
        }

        .helper-box {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(34, 195, 146, 0.08);
            color: #1a6b53;
            font-size: 0.92rem;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading-overlay" class="d-none">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <nav class="navbar navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-capsule-pill me-2"></i>MedReminder</a>
            <div>
                <a href="index.html" class="btn btn-light btn-sm rounded-pill px-3 fw-bold">Người bệnh</a>
                <a href="news.html" class="btn btn-light btn-sm rounded-pill px-3 fw-bold ms-2">Tin tức</a>
                <a href="admin.html" class="btn btn-outline-light btn-sm rounded-pill px-3 ms-2">Quản trị</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="sessionNotice" class="helper-box hidden"></div>

        <div class="filter-section">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
                <div>
                    <h5 class="fw-bold mb-1">Xem lịch uống thuốc</h5>
                    <p class="text-muted small mb-0">Chọn ngày, tuần hoặc tháng để theo dõi thuốc</p>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <label class="fw-bold small mb-0">Ngày:</label>
                    <input type="date" id="dateFilter" class="form-control rounded-pill border-primary shadow-sm">
                </div>
            </div>

            <div class="view-toggle" id="viewToggle">
                <button type="button" class="btn btn-outline-primary active" data-view="day">Ngày</button>
                <button type="button" class="btn btn-outline-primary" data-view="week">Tuần</button>
                <button type="button" class="btn btn-outline-primary" data-view="month">Tháng</button>
            </div>
        </div>

        <div id="scheduleContainer"></div>
    </div>

    <button class="fab-add" data-bs-toggle="modal" data-bs-target="#addModal">
        <i class="bi bi-plus-lg"></i>
    </button>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 25px;">
                <div class="modal-body p-4">
                    <h5 class="fw-bold mb-4">Thêm lịch nhắc mới</h5>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">Tên thuốc</label>
                        <input type="text" id="newMedName" class="form-control rounded-pill border-light bg-light p-3" placeholder="Ví dụ: Paracetamol">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">Giờ uống</label>
                        <input type="time" id="newMedTime" class="form-control rounded-pill border-light bg-light p-3">
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-primary rounded-pill py-3 fw-bold" id="btnSaveQuick">Lưu lịch nhắc</button>
                        <button class="btn btn-light rounded-pill py-3 text-muted" data-bs-dismiss="modal">Hủy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://6a06dc73c83ba8ad9b3e047a.mockapi.io/schedules";

        let currentView = 'day';
        let currentDate = new Date();

        function getLocalDateString(dateObj) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function parseLocalDate(value) {
            if (!value) {
                return null;
            }

            const [year, month, day] = value.split('-').map(Number);
            if (!year || !month || !day) {
                return null;
            }

            return new Date(year, month - 1, day);
        }

        function normalizeDateValue(rawDate) {
            if (!rawDate) return '';
            return rawDate.split('T')[0];
        }

        function createDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function getWeekStart(dateObj) {
            const baseDate = new Date(dateObj);
            const day = baseDate.getDay();
            const diff = (day === 0 ? -6 : 1) - day;
            baseDate.setDate(baseDate.getDate() + diff);
            baseDate.setHours(0, 0, 0, 0);
            return baseDate;
        }

        function getWeekDays(weekStart) {
            return Array.from({ length: 7 }, (_, index) => {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + index);
                return date;
            });
        }

        function getMonthDays(baseDate) {
            const firstDay = new Date(baseDate.getFullYear(), baseDate.getMonth(), 1);
            const startOffset = (firstDay.getDay() + 6) % 7;
            const start = new Date(firstDay);
            start.setDate(firstDay.getDate() - startOffset);

            return Array.from({ length: 42 }, (_, index) => {
                const date = new Date(start);
                date.setDate(start.getDate() + index);
                return date;
            });
        }

        function getScheduleForDate(items, dateStr) {
            return items
                .filter(item => normalizeDateValue(item.date) === dateStr)
                .sort((a, b) => a.time.localeCompare(b.time));
        }

        function renderDayView(items) {
            const container = $('#scheduleContainer').empty();
            const currentDateStr = getLocalDateString(currentDate);
            const dayItems = getScheduleForDate(items, currentDateStr);

            if (dayItems.length === 0) {
                container.append(`<div class="text-center mt-5"><p class="mb-0 text-muted">Trống lịch cho ngày này</p></div>`);
                return;
            }

            const cards = dayItems.map(item => `
                <div class="col-md-6 col-lg-4">
                    <div class="card card-med p-3 ${item.isTaken ? 'is-taken' : ''}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-3">
                                <span class="time-badge"><i class="bi bi-alarm me-1"></i>${item.time}</span>
                                ${item.isTaken ? '<span class="badge bg-success rounded-pill px-3">Đã xong</span>' : '<span class="badge bg-warning text-dark rounded-pill px-3">Chờ uống</span>'}
                            </div>
                            <h5 class="med-name fw-bold mb-2">${item.medName}</h5>
                            <p class="text-muted small mb-4">Ngày nhắc: ${currentDateStr}</p>
                            <button class="btn w-100 rounded-pill fw-bold transition ${item.isTaken ? 'btn-outline-secondary' : 'btn-primary shadow'}" onclick="markAsTaken('${item.id}', ${item.isTaken})">
                                ${item.isTaken ? 'Hoàn tác' : 'Đã uống thuốc'}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            container.append(`<div class="row g-4">${cards}</div>`);
        }

        function renderWeekView(items) {
            const container = $('#scheduleContainer').empty();
            const weekStart = getWeekStart(currentDate);
            const weekDays = getWeekDays(weekStart);

            const columns = weekDays.map(day => {
                const dateStr = getLocalDateString(day);
                const dayItems = getScheduleForDate(items, dateStr);

                const entries = dayItems.map(item => `
                    <div class="calendar-item">
                        <div class="calendar-item-time">${item.time}</div>
                        <div class="calendar-item-name">${item.medName}</div>
                        <div class="calendar-item-status">${item.isTaken ? 'Đã xong' : 'Chờ uống'}</div>
                    </div>
                `).join('');

                return `
                    <div class="calendar-day-column">
                        <div class="calendar-day-title">${day.getDate()}</div>
                        <div class="calendar-day-meta">${day.toLocaleDateString('vi-VN', { weekday: 'short' })}</div>
                        <div class="calendar-day-count">${dayItems.length} nhắc</div>
                        ${entries || '<div class="calendar-empty-state">Không có lịch</div>'}
                    </div>
                `;
            }).join('');

            container.append(`<div class="calendar-week-grid">${columns}</div>`);
        }

        function renderMonthView(items) {
            const container = $('#scheduleContainer').empty();
            const monthDays = getMonthDays(currentDate);
            const headings = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];

            const cells = monthDays.map(day => {
                const dateStr = getLocalDateString(day);
                const dayItems = getScheduleForDate(items, dateStr);
                const isCurrentMonth = day.getMonth() === currentDate.getMonth();
                const isToday = dateStr === getLocalDateString(new Date());

                const summary = dayItems.slice(0, 2).map(item => `
                    <div class="calendar-month-pill">${item.time} • ${item.medName}</div>
                `).join('');

                return `
                    <div class="calendar-month-cell ${!isCurrentMonth ? 'calendar-month-cell--disabled' : ''} ${isToday ? 'calendar-month-cell--today' : ''}">
                        <div class="calendar-month-label">${day.getDate()}</div>
                        <div class="calendar-month-summary">
                            ${summary || '<span class="text-muted">Không có lịch</span>'}
                            ${dayItems.length > 2 ? `<span class="text-muted">+${dayItems.length - 2} nhắc khác</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            const header = headings.map(label => `<div class="text-center fw-bold text-muted">${label}</div>`).join('');
            container.append(`<div class="calendar-month-grid">${header}${cells}</div>`);
        }

        function renderScheduleView(items) {
            if (currentView === 'week') {
                renderWeekView(items);
                return;
            }

            if (currentView === 'month') {
                renderMonthView(items);
                return;
            }

            renderDayView(items);
        }

        async function loadSchedules() {
            $('#loading-overlay').removeClass('d-none');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                renderScheduleView(data);
            } catch (error) {
                console.error(error);
            } finally {
                $('#loading-overlay').addClass('d-none');
            }
        }

        $(document).ready(() => {
            currentDate = new Date();
            $('#dateFilter').val(getLocalDateString(currentDate));
            loadSchedules();
        });

        $('#dateFilter').change(function() {
            currentDate = parseLocalDate($(this).val()) || new Date();
            loadSchedules();
        });

        $('#viewToggle .btn').on('click', function() {
            $('#viewToggle .btn').removeClass('active');
            $(this).addClass('active');
            currentView = $(this).data('view');
            loadSchedules();
        });

        $('#btnSaveQuick').click(async function() {
            const medName = $('#newMedName').val();
            const time = $('#newMedTime').val();
            const date = $('#dateFilter').val();

            if (!medName || !time) {
                return alert('Vui lòng nhập đủ thông tin!');
            }

            $('#loading-overlay').removeClass('d-none');
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ medName, time, isTaken: false, date })
            });

            $('#addModal').modal('hide');
            $('#newMedName').val('');
            loadSchedules();
        });

        async function markAsTaken(id, currentStatus) {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isTaken: !currentStatus })
            });
            loadSchedules();
        }
    </script>
    <script>
        (function() {
            const STORAGE_KEY = 'medreminder_standalone_current_user';

            function getCurrentUser() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return null;
                    return JSON.parse(raw);
                } catch (error) {
                    return null;
                }
            }

            function clearSession() {
                localStorage.removeItem(STORAGE_KEY);
                $('#sessionNotice').addClass('hidden').empty();
            }

            function renderSessionNotice(currentUser) {
                $('#sessionNotice')
                    .removeClass('hidden')
                    .html(`
                        <strong>Thông báo:</strong> Bạn đang đăng nhập với <strong>${currentUser.email}</strong> (${currentUser.role}).
                        <div class="mt-2">
                            <button type="button" id="continueSessionBtn" class="btn btn-primary btn-sm">Tiếp tục</button>
                            <button type="button" id="logoutSessionBtn" class="btn btn-outline-secondary btn-sm ms-2">Đăng xuất</button>
                        </div>
                    `);

                $('#continueSessionBtn').on('click', function () {
                    window.location.href = 'index.html';
                });

                $('#logoutSessionBtn').on('click', function () {
                    clearSession();
                    window.location.replace('auth-standalone.html');
                });
            }

            const currentUser = getCurrentUser();

            if (!currentUser) {
                window.location.replace('auth-standalone.html');
                return;
            }

            renderSessionNotice(currentUser);

            const adminLink = document.querySelector('a[href="admin.html"]');

            if (currentUser.role !== 'admin') {
                if (adminLink) {
                    adminLink.remove();
                }
            }
        })();
    </script>
</body>
</html>
