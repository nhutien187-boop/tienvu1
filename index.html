<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedReminder - Quản lý & Theo dõi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #5b3cff;
            --secondary: #7588ff;
            --success: #22c392;
            --danger: #ff5d7a;
            --bg: #eef2ff;
            --surface: #ffffff;
            --surface-soft: #f6f7ff;
            --text: #232a4a;
            --muted: #6f7b9d;
            --border: rgba(110, 125, 255, 0.14);
            --shadow: 0 30px 80px rgba(50, 63, 128, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(91, 60, 255, 0.2), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(95, 196, 255, 0.14), transparent 28%),
                        var(--bg);
            color: var(--text);
            padding-bottom: 100px;
        }

        .navbar {
            background: linear-gradient(135deg, rgba(91, 60, 255, 1), rgba(117, 136, 255, 0.95));
            border: none;
            box-shadow: 0 24px 70px rgba(49, 67, 160, 0.18);
        }

        .navbar .navbar-brand {
            letter-spacing: 0.03em;
        }

        .navbar .btn {
            border-radius: 999px;
            font-weight: 700;
        }

        .hero-panel {
            background: rgba(255,255,255,0.98);
            border: 1px solid rgba(110, 125, 255, 0.16);
            border-radius: 36px;
            padding: 36px;
            box-shadow: 0 35px 95px rgba(49, 67, 160, 0.14);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .hero-panel::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -90px;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(91, 60, 255, 0.20), transparent 55%);
            filter: blur(14px);
            pointer-events: none;
        }

        .hero-panel::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(117, 136, 255, 0.14), transparent 60%);
            filter: blur(12px);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            background: rgba(91, 60, 255, 0.09);
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .hero-panel h2 {
            font-size: clamp(2.2rem, 2.8vw, 3rem);
            letter-spacing: -0.04em;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .hero-panel p {
            color: var(--muted);
            max-width: 730px;
            position: relative;
            z-index: 1;
        }

        .hero-actions {
            margin-top: 1.75rem;
            position: relative;
            z-index: 1;
        }

        .hero-stat {
            background: var(--surface-soft);
            border: 1px solid rgba(110, 125, 255, 0.12);
            border-radius: 22px;
            padding: 22px 26px;
            min-width: 150px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.75);
        }

        .next-card {
            background: #ffffff;
            border: 1px solid rgba(91, 60, 255, 0.12);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 18px 46px rgba(91, 60, 255, 0.08);
        }

        .next-card h5 {
            margin-bottom: 0.85rem;
        }

        .reminder-time {
            font-size: 2.35rem;
            letter-spacing: -0.04em;
            color: var(--primary);
        }

        .reminder-meta {
            color: var(--muted);
        }

        .hero-stat h3 {
            font-size: 1.9rem;
            margin-bottom: 0.35rem;
            color: var(--text);
        }

        .hero-stat small {
            color: var(--muted);
        }

        .card-med {
            border: none;
            border-radius: 28px;
            box-shadow: 0 20px 65px rgba(50, 63, 128, 0.12);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            background: linear-gradient(180deg, #ffffff, #f7f8ff);
            position: relative;
            overflow: hidden;
        }

        .card-med::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, rgba(91, 60, 255, 1), rgba(117, 136, 255, 0.8));
        }

        .card-med:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 80px rgba(50, 63, 128, 0.16);
        }

        .card-med .card-body {
            padding: 26px 24px 22px;
        }

        .med-name {
            font-size: 1.15rem;
            letter-spacing: -0.02em;
        }

        .is-taken {
            background: #eef4ff !important;
        }

        .is-taken .med-name {
            text-decoration: line-through;
            color: #8d99c7;
        }

        .filter-section {
            background: rgba(255,255,255,0.96);
            padding: 28px;
            border-radius: 28px;
            border: 1px solid rgba(110, 125, 255, 0.12);
            box-shadow: 0 20px 55px rgba(82, 94, 180, 0.08);
            margin-bottom: 30px;
        }

        .time-badge {
            background: rgba(91, 60, 255, 0.08);
            color: var(--primary);
            padding: 8px 18px;
            border-radius: 999px;
            font-weight: 700;
        }

        .form-control,
        .form-control:focus,
        .form-control:focus-visible {
            border-radius: 999px;
            border: 1px solid rgba(110, 125, 255, 0.2);
            box-shadow: none;
            padding: 0.95rem 1.15rem;
            background: #f9fbff;
        }

        .form-control:focus {
            border-color: rgba(91, 60, 255, 0.35);
        }

        .btn-primary {
            background: var(--primary);
            border-color: transparent;
            box-shadow: 0 16px 34px rgba(91, 60, 255, 0.18);
        }

        .btn-primary:hover {
            background: #4238ff;
        }

        .btn-outline-light {
            color: #ffffff;
            border-color: rgba(255,255,255,0.35);
        }

        .btn-outline-light:hover {
            color: white;
            background: rgba(255,255,255,0.12);
        }

        .fab-add {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, var(--primary), #6b7dff);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 28px 64px rgba(91, 60, 255, 0.24);
            border: none;
            z-index: 1000;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .fab-add:hover {
            transform: scale(1.08);
            background: #3829ff;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.78);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .schedule-empty {
            min-height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
        }

        .modal-content {
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(110, 125, 255, 0.12);
        }

        .modal-body .form-control {
            border-radius: 18px;
            padding: 0.95rem 1.25rem;
            background: #f7f8ff;
        }
    </style>
</head>
<body>
    <div id="loading-overlay" class="d-none">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <nav class="navbar navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-capsule-pill me-2"></i>MedReminder</a>
            <div>
                <a href="index.html" class="btn btn-light btn-sm rounded-pill px-3 fw-bold">Người bệnh</a>
                <a href="admin.html" class="btn btn-outline-light btn-sm rounded-pill px-3">Quản trị</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="filter-section d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div>
                <h5 class="fw-bold mb-1">Xem lịch uống thuốc</h5>
                <p class="text-muted small mb-0">Chọn ngày để kiểm tra hoặc thêm lịch mới</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <label class="fw-bold small">Ngày:</label>
                <input type="date" id="dateFilter" class="form-control rounded-pill border-primary shadow-sm">
            </div>
        </div>

        <div class="row g-4" id="scheduleContainer">
            </div>
    </div>

    <button class="fab-add" data-bs-toggle="modal" data-bs-target="#addModal">
        <i class="bi bi-plus-lg"></i>
    </button>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 25px;">
                <div class="modal-body p-4">
                    <h5 class="fw-bold mb-4">Thêm lịch nhắc mới</h5>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">Tên thuốc</label>
                        <input type="text" id="newMedName" class="form-control rounded-pill border-light bg-light p-3" placeholder="Ví dụ: Paracetamol">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">Giờ uống</label>
                        <input type="time" id="newMedTime" class="form-control rounded-pill border-light bg-light p-3">
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-primary rounded-pill py-3 fw-bold" id="btnSaveQuick">Lưu lịch nhắc</button>
                        <button class="btn btn-light rounded-pill py-3 text-muted" data-bs-dismiss="modal">Hủy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://6a06dc73c83ba8ad9b3e047a.mockapi.io/schedules";

        function getLocalDateString(dateObj) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function normalizeDateValue(rawDate) {
            if (!rawDate) return '';
            return rawDate.split('T')[0];
        }

        $(document).ready(() => {
            const today = getLocalDateString(new Date());
            $('#dateFilter').val(today);
            loadSchedules(today);
        });

        $('#dateFilter').change(function() {
            loadSchedules($(this).val());
        });

        async function loadSchedules(selectedDate) {
            $('#loading-overlay').removeClass('d-none');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const filtered = data.filter(item => normalizeDateValue(item.date) === selectedDate);
                filtered.sort((a, b) => a.time.localeCompare(b.time));

                const container = $('#scheduleContainer').empty();
                if (filtered.length === 0) {
                    container.append('<div class="text-center mt-5"><p>Trống lịch cho ngày này</p></div>');
                    $('#nextReminderTime').text('--:--');
                    $('#nextReminderName').text('Chưa có lịch hôm nay');
                } else {
                    const nextReminder = filtered.find(item => !item.isTaken) || filtered[0];
                    $('#nextReminderTime').text(nextReminder.time || '--:--');
                    $('#nextReminderName').text(nextReminder.medName || 'Chưa có lịch hôm nay');
                }

                filtered.forEach(item => {
                    const displayDate = normalizeDateValue(item.date) || selectedDate;
                    container.append(`
                        <div class="col-md-6 col-lg-4">
                            <div class="card card-med p-3 ${item.isTaken ? 'is-taken' : ''}">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between mb-3">
                                        <span class="time-badge"><i class="bi bi-alarm me-1"></i>${item.time}</span>
                                        ${item.isTaken ? '<span class="badge bg-success rounded-pill px-3">Đã xong</span>' : '<span class="badge bg-warning text-dark rounded-pill px-3">Chờ uống</span>'}
                                    </div>
                                    <h5 class="med-name fw-bold mb-2">${item.medName}</h5>
                                    <p class="text-muted small mb-4">Ngày nhắc: ${displayDate}</p>
                                    <button class="btn w-100 rounded-pill fw-bold transition ${item.isTaken ? 'btn-outline-secondary' : 'btn-primary shadow'}" 
                                            onclick="markAsTaken('${item.id}', ${item.isTaken})">
                                        ${item.isTaken ? 'Hoàn tác' : 'Đã uống thuốc'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `);
                });
            } catch (error) { console.error(error); } 
            finally { $('#loading-overlay').addClass('d-none'); }
        }

        // Chức năng THÊM NHANH (POST)
        $('#btnSaveQuick').click(async function() {
            const medName = $('#newMedName').val();
            const time = $('#newMedTime').val();
            const date = $('#dateFilter').val();

            if(!medName || !time) return alert("Vui lòng nhập đủ thông tin!");

            $('#loading-overlay').removeClass('d-none');
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ medName, time, isTaken: false, date })
            });

            $('#addModal').modal('hide');
            $('#newMedName').val('');
            loadSchedules(date);
        });

        async function markAsTaken(id, currentStatus) {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isTaken: !currentStatus })
            });
            loadSchedules($('#dateFilter').val());
        }
    </script>
    <script>
        (function() {
            const STORAGE_KEY = 'medreminder_standalone_current_user';

            function getCurrentUser() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return null;
                    return JSON.parse(raw);
                } catch (error) {
                    return null;
                }
            }

            const currentUser = getCurrentUser();
            const adminLink = document.querySelector('a[href="admin.html"]');

            if (!currentUser || currentUser.role !== 'admin') {
                if (adminLink) {
                    adminLink.remove();
                }
            }
        })();
    </script>
</body>
</html>
