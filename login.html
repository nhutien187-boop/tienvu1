<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MedReminder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #5b3cff;
            --secondary: #7588ff;
            --success: #22c392;
            --text: #232a4a;
            --muted: #6f7b9d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(91, 60, 255, 0.3), transparent 40%),
                        radial-gradient(circle at bottom right, rgba(95, 196, 255, 0.2), transparent 35%),
                        linear-gradient(135deg, #eef2ff, #f5f0ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 40px 100px rgba(49, 67, 160, 0.15),
                        inset 0 0 0 1px rgba(110, 125, 255, 0.08);
            border: 1px solid rgba(110, 125, 255, 0.12);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo {
            font-size: 40px;
            margin-bottom: 16px;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .auth-header p {
            color: var(--muted);
            font-size: 14px;
        }

        .form-control {
            border-radius: 16px;
            padding: 14px 18px;
            border: 1px solid rgba(110, 125, 255, 0.2);
            background: #f9fbff;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(91, 60, 255, 0.08);
            outline: none;
        }

        .form-label {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .btn-auth {
            border-radius: 16px;
            padding: 13px 20px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 20px 50px rgba(91, 60, 255, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 28px 60px rgba(91, 60, 255, 0.28);
            background: linear-gradient(135deg, #4238ff, #6b7dff);
            color: white;
        }

        .btn-outline-secondary {
            color: var(--muted);
            border: 1px solid rgba(110, 125, 255, 0.2);
            background: transparent;
        }

        .btn-outline-secondary:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(91, 60, 255, 0.04);
        }

        .form-toggle {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(110, 125, 255, 0.08);
        }

        .form-toggle p {
            color: var(--muted);
            font-size: 14px;
            margin: 0;
        }

        .form-toggle button {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }

        .form-toggle button:hover {
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .quick-login {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(110, 125, 255, 0.08);
        }

        .quick-login-btn {
            background: linear-gradient(135deg, rgba(34, 195, 146, 0.9), rgba(34, 195, 146, 0.7));
            color: white;
            font-size: 13px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .quick-login-btn:hover {
            background: linear-gradient(135deg, #22c392, #1fab7a);
            transform: translateY(-1px);
            box-shadow: 0 12px 30px rgba(34, 195, 146, 0.25);
        }

        .hint-text {
            font-size: 12px;
            color: var(--muted);
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(34, 195, 146, 0.05);
            border-radius: 10px;
            border-left: 3px solid var(--success);
        }

        .hidden-form {
            display: none;
        }

        .visible-form {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }

            .auth-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Inter, Arial, sans-serif; background: #f4f7ff; padding: 20px;">
        <div style="max-width: 520px; width: 100%; text-align: center; background: #ffffff; border-radius: 24px; padding: 32px; box-shadow: 0 24px 60px rgba(49, 67, 160, 0.12);">
            <div style="font-size: 42px; margin-bottom: 16px;">💊</div>
            <h1 style="font-size: 28px; margin-bottom: 12px; color: #232a4a;">Đăng nhập đã được tắt</h1>
            <p style="color: #6f7b9d; margin-bottom: 24px; line-height: 1.6;">
                Trang đăng nhập không còn được sử dụng. Bạn sẽ được chuyển về trang chủ ngay sau đây.
            </p>
            <a href="index.html" style="display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #5b3cff, #7588ff); color: #fff; text-decoration: none; border-radius: 999px; font-weight: 700;">
                Về trang chủ
            </a>
        </div>
    </div>

    <script>
        window.location.replace('index.html');
    </script>
</body>
</html>
