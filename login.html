<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MedReminder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #5b3cff;
            --secondary: #7588ff;
            --success: #22c392;
            --text: #232a4a;
            --muted: #6f7b9d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(91, 60, 255, 0.3), transparent 40%),
                        radial-gradient(circle at bottom right, rgba(95, 196, 255, 0.2), transparent 35%),
                        linear-gradient(135deg, #eef2ff, #f5f0ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 40px 100px rgba(49, 67, 160, 0.15),
                        inset 0 0 0 1px rgba(110, 125, 255, 0.08);
            border: 1px solid rgba(110, 125, 255, 0.12);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo {
            font-size: 40px;
            margin-bottom: 16px;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .auth-header p {
            color: var(--muted);
            font-size: 14px;
        }

        .form-control {
            border-radius: 16px;
            padding: 14px 18px;
            border: 1px solid rgba(110, 125, 255, 0.2);
            background: #f9fbff;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(91, 60, 255, 0.08);
            outline: none;
        }

        .form-label {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .btn-auth {
            border-radius: 16px;
            padding: 13px 20px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 20px 50px rgba(91, 60, 255, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 28px 60px rgba(91, 60, 255, 0.28);
            background: linear-gradient(135deg, #4238ff, #6b7dff);
            color: white;
        }

        .btn-outline-secondary {
            color: var(--muted);
            border: 1px solid rgba(110, 125, 255, 0.2);
            background: transparent;
        }

        .btn-outline-secondary:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(91, 60, 255, 0.04);
        }

        .form-toggle {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(110, 125, 255, 0.08);
        }

        .form-toggle p {
            color: var(--muted);
            font-size: 14px;
            margin: 0;
        }

        .form-toggle button {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }

        .form-toggle button:hover {
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .quick-login {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(110, 125, 255, 0.08);
        }

        .quick-login-btn {
            background: linear-gradient(135deg, rgba(34, 195, 146, 0.9), rgba(34, 195, 146, 0.7));
            color: white;
            font-size: 13px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .quick-login-btn:hover {
            background: linear-gradient(135deg, #22c392, #1fab7a);
            transform: translateY(-1px);
            box-shadow: 0 12px 30px rgba(34, 195, 146, 0.25);
        }

        .hint-text {
            font-size: 12px;
            color: var(--muted);
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(34, 195, 146, 0.05);
            border-radius: 10px;
            border-left: 3px solid var(--success);
        }

        .hidden-form {
            display: none;
        }

        .visible-form {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }

            .auth-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">💊</div>
                <h1>MedReminder</h1>
                <p>Quản lý & Theo dõi thuốc hàng ngày</p>
            </div>

            <!-- FORM ĐĂNG NHẬP -->
            <form id="formLogin" class="visible-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-auth btn-primary w-100 mb-3">Đăng nhập</button>
                
                <div class="quick-login">
                    <button type="button" class="btn btn-auth quick-login-btn w-100 mb-2" onclick="quickLoginAdmin()">
                        <i class="bi bi-lightning-fill"></i>Đăng nhập Admin nhanh
                    </button>
                </div>

                <div class="hint-text">
                    <strong>💡 Tài khoản Demo:</strong><br>
                    Email: admin@medreminder.com<br>
                    Mật khẩu: Admin123
                </div>

                <div class="form-toggle">
                    <p>Chưa có tài khoản? <button type="button" onclick="toggleForm(false)">Đăng ký ngay</button></p>
                </div>
            </form>

            <!-- FORM ĐĂNG KÝ -->
            <form id="formRegister" class="hidden-form">
                <div class="form-group">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" id="regName" class="form-control" placeholder="Tên của bạn" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-auth btn-primary w-100 mb-3">Đăng ký</button>
                
                <div class="quick-login">
                    <button type="button" class="btn btn-auth quick-login-btn w-100 mb-2" onclick="quickRegisterDemo()">
                        <i class="bi bi-lightning-fill"></i>Tạo tài khoản Demo
                    </button>
                </div>

                <div class="form-toggle">
                    <p>Đã có tài khoản? <button type="button" onclick="toggleForm(true)">Đăng nhập</button></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Chuyển đổi form
        function toggleForm(showLogin) {
            const loginForm = $('#formLogin');
            const registerForm = $('#formRegister');

            if (showLogin) {
                loginForm.removeClass('hidden-form').addClass('visible-form');
                registerForm.removeClass('visible-form').addClass('hidden-form');
            } else {
                loginForm.removeClass('visible-form').addClass('hidden-form');
                registerForm.removeClass('hidden-form').addClass('visible-form');
            }

            // Reset forms
            $('#loginEmail').val('');
            $('#loginPassword').val('');
            $('#regName').val('');
            $('#regEmail').val('');
            $('#regPassword').val('');
        }

        // Xử lý sự kiện Đăng nhập
        $('#formLogin').submit(function(e) {
            e.preventDefault();
            const email = $('#loginEmail').val().trim();
            const password = $('#loginPassword').val();

            const result = loginUser(email, password);
            if (!result.success) {
                alert(result.message);
                return;
            }

            window.location.href = 'index.html';
        });

        // Xử lý sự kiện Đăng ký
        $('#formRegister').submit(function(e) {
            e.preventDefault();
            const name = $('#regName').val().trim();
            const email = $('#regEmail').val().trim();
            const password = $('#regPassword').val();

            if (!name || !email || !password) {
                alert('Vui lòng nhập đầy đủ thông tin!');
                return;
            }

            const result = registerUser({ name, email, password });
            if (!result.success) {
                alert(result.message);
                return;
            }

            // Đăng nhập tự động sau khi đăng ký
            const loginResult = loginUser(email, password);
            if (loginResult.success) {
                window.location.href = 'index.html';
            }
        });

        // Quick login admin
        function quickLoginAdmin() {
            $('#loginEmail').val('admin@medreminder.com');
            $('#loginPassword').val('Admin123');
            $('#formLogin').submit();
        }

        // Quick register demo user
        function quickRegisterDemo() {
            $('#regName').val('Demo User');
            $('#regEmail').val('demo@example.com');
            $('#regPassword').val('123456');
            $('#formRegister').submit();
        }
    </script>
</body>
</html>
